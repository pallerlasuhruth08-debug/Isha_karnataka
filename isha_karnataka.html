  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;font-family:var(--font-ui);font-size:14px;line-height:1.5;letter-spacing:-0.006em;
    color:var(--color-text-primary);

  #root{max-width:1120px;margin:0 auto;padding:18px 20px 90px;}
  input,select,textarea,button{font-family:inherit;}
  button{transition:transform .12s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease, color .18s ease;}
  button:hover:not(:disabled){transform:translateY(-1px);}
  button:active:not(:disabled){transform:translateY(0);}
  input,select,textarea{transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;}
  input:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(83,74,183,.12);}
  a{color:var(--accent);text-decoration:none;}
  a:hover{text-decoration:underline;}

  .view{animation:fadeUp .32s cubic-bezier(.2,.7,.3,1) both;}

  .boot{padding:24px;font-size:14px;color:var(--color-text-secondary);}

.dash-hero{position:relative;overflow:hidden;border-radius:22px;padding:34px 36px 56px;margin-bottom:22px;background:linear-gradient(135deg,#534AB7 0%,#7C5BD6 45%,#E07A5F 100%);color:#fff;box-shadow:0 18px 50px rgba(83,74,183,.28),0 6px 18px rgba(40,36,25,.10);isolation:isolate;}
.dash-hero::before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle at 20% 30%,rgba(255,255,255,.35),transparent 40%),radial-gradient(circle at 80% 70%,rgba(255,200,120,.30),transparent 45%);animation:dashFloat 14s ease-in-out infinite;z-index:-1;}
.dash-hero::after{content:"";position:absolute;top:0;left:-150%;width:60%;height:100%;background:linear-gradient(110deg,transparent 0%,rgba(255,255,255,.18) 50%,transparent 100%);transform:skewX(-20deg);animation:dashShine 6s ease-in-out infinite;pointer-events:none;}
.dash-hero h1{font-family:var(--font-display);font-size:clamp(34px,4.6vw,52px);font-weight:700;line-height:1.04;margin:0 0 8px;letter-spacing:-0.02em;text-shadow:0 2px 18px rgba(0,0,0,.18);}
.dash-hero .dash-sub{font-size:15px;font-weight:500;opacity:.94;margin-bottom:18px;letter-spacing:.01em;}
.dash-hero .dash-eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.18);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.28);padding:6px 13px;border-radius:999px;font-size:11.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;transition:transform .25s ease,background .25s ease;cursor:default;}
.dash-hero .dash-eyebrow:hover{background:rgba(255,255,255,.28);transform:translateY(-1px);}
.dash-hero .dash-dot{width:8px;height:8px;border-radius:50%;background:#7FFFB1;box-shadow:0 0 12px #7FFFB1;animation:dashBlink 1.6s ease-in-out infinite;}
.dash-hero .dash-chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;position:relative;z-index:1;}
.dash-hero .dash-chip{display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border-radius:14px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);font-size:13px;font-weight:600;cursor:default;transition:transform .2s ease,background .2s ease,box-shadow .2s ease;animation:dashCount .5s ease both;}
.dash-hero .dash-chip:hover{transform:translateY(-2px) scale(1.03);background:rgba(255,255,255,.24);box-shadow:0 8px 22px rgba(0,0,0,.18);}
.dash-hero .dash-chip b{font-family:var(--font-display);font-size:17px;font-weight:700;}
.dash-hero .dash-chip:nth-child(1){animation-delay:.05s;}
.dash-hero .dash-chip:nth-child(2){animation-delay:.15s;}
.dash-hero .dash-chip:nth-child(3){animation-delay:.25s;}
.dash-hero .dash-chip:nth-child(4){animation-delay:.35s;}
.dash-hero .dash-chip:nth-child(5){animation-delay:.45s;}
@keyframes dashFloat{0%,100%{transform:translate(0,0) rotate(0deg);}33%{transform:translate(20px,-15px) rotate(2deg);}66%{transform:translate(-15px,10px) rotate(-2deg);}}
@keyframes dashShine{0%,100%{left:-150%;}55%,100%{left:150%;}}
@keyframes dashBlink{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.35);opacity:.75;}}
@keyframes dashCount{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@media (max-width:560px){.dash-hero{padding:26px 22px 44px;border-radius:18px;}.dash-hero h1{font-size:32px;}}

const backendReady = () => GAS_URL && !GAS_URL.startsWith("PASTE_YOUR");

async function api(action, payload) {
  if (!backendReady()) throw new Error("Backend not configured (set GAS_URL).");
  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" }, // text/plain => no CORS preflight

}

    {k:"volunteerSince",label:"Volunteering since",type:"text"},
    {k:"currentSadhana",label:"Current sadhana",type:"text"},
    {k:"ishaConnectId",label:"IshaConnect ID",type:"text"},
  ]},
  { id:"location", title:"Location", fields:[
    {k:"locality",label:"Locality / area",type:"text"},
    {k:"address",label:"Address",type:"textarea"},
    {k:"preferredCentre",label:"Preferred centre",type:"text"},
  ]},
];

function rolesForStage(st) { return ROLES.filter(r => r.minS <= st); }
function subsForStage(role, st) { return role.subs.filter(s => s.minS <= st); }
function countFill(unit) {
  const st = unit.stage||1; let f=0,t=0;
  rolesForStage(st).forEach(r => {
    t++; if(unit.team?.[r.id]?.name?.trim()) f++;
    subsForStage(r,st).forEach(sb => { t++; if(unit.team?.[sb.id]?.name?.trim()) f++; });
  });
  return {f,t};
}
function statusCounts(unit){
  const st=unit.stage||1; const c={identified:0,interim:0,vacant:0};
  rolesForStage(st).forEach(r=>{
    const p=unit.team?.[r.id]||{}; c[p.name?.trim()?(p.status||"identified"):"vacant"]++;
    subsForStage(r,st).forEach(sb=>{const sp=unit.team?.[sb.id]||{}; c[sp.name?.trim()?(sp.status||"identified"):"vacant"]++;});
  });
  return c;
}
function inits(name) {
  if(!name?.trim()) return "?";
  return name.trim().split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
}
function pct(f,t) { return t>0?Math.round(f/t*100):0; }

// ── Region dashboard ──
function RegionDashboard({S, getCd, nav, user}) {
  let f=0,t=0,sc={identified:0,interim:0,vacant:0};
  ALL_CENTRES.forEach(c=>{(getCd(c.id).units||[]).forEach(u=>{const x=countFill(u);f+=x.f;t+=x.t;const s=statusCounts(u);sc.identified+=s.identified;sc.interim+=s.interim;sc.vacant+=s.vacant;});});
  REGION_ROLES.forEach(r=>{const p=S.region?.[r.id]||{};t++;if(p.name?.trim()){f++;sc[p.status||"identified"]++;}else sc.vacant++;});
  const liveC=ALL_CENTRES.filter(c=>{const d=getCd(c.id);return (d.units||[]).length>0||d.stage>0;}).length;
  const Kpi=({n,l,c})=>(
    <Card style={{padding:"14px 16px",flex:1,minWidth:118,boxShadow:"var(--shadow-sm)"}}>
      <div className="display" style={{fontSize:30,fontWeight:600,lineHeight:1,color:c||"var(--color-text-primary)"}}>{n}</div>
      <div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:5,textTransform:"uppercase",letterSpacing:".05em"}}>{l}</div>
    </Card>
  );
  const vfill={}; VERTS.forEach(v=>vfill[v.id]={f:0,t:0});
  ALL_CENTRES.forEach(c=>{(getCd(c.id).units||[]).forEach(u=>{
    const st=u.stage||1;
    rolesForStage(st).forEach(r=>{ const vid = r.id==="coordinator"?null:r.id; if(!vid||!vfill[vid])return;
      vfill[vid].t++; if(u.team?.[r.id]?.name?.trim()) vfill[vid].f++;
      subsForStage(r,st).forEach(sb=>{vfill[vid].t++; if(u.team?.[sb.id]?.name?.trim()) vfill[vid].f++;});
    });
  });});
  return (
    <div>
      <div className="dash-hero">
        <div className="dash-eyebrow"><span className="dash-dot"></span> Karnataka · Live overview</div>
        <h1>Region dashboard</h1>
        <div className="dash-sub">A real-time pulse of every centre, role and volunteer across Karnataka.</div>
        <div className="dash-chips">
          <div className="dash-chip" title="Total centres"><b>{ALL_CENTRES.length}</b> centres</div>
          <div className="dash-chip" title="Centres set up" style={{color:'#A8FFD2'}}><b>{liveC}</b> set up</div>
          <div className="dash-chip" title="Identified" style={{color:'#A8FFD2'}}><b>{sc.identified}</b> identified</div>
          <div className="dash-chip" title="Interim" style={{color:'#FFE4A8'}}><b>{sc.interim}</b> interim</div>
          <div className="dash-chip" title="Vacant"><b>{sc.vacant}</b> vacant</div>
        </div>
      </div>
      <div style={{display:"flex",gap:9,flexWrap:"wrap",marginBottom:18}}>
        <Kpi n={ALL_CENTRES.length} l="centres"/>
        <Kpi n={liveC} l="set up" c="#1D9E75"/>
        <Kpi n={`${pct(f,t)}%`} l={`roles filled`} c="#4A5C8A"/>
        <Kpi n={sc.identified} l="identified" c="#1D9E75"/>
        <Kpi n={sc.interim} l="interim" c="#EF9F27"/>
        <Kpi n={sc.vacant} l="vacant" c="#a4a194"/>
      </div>
      <SH mt={0}>Fill by vertical (across centres)</SH>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:9,marginBottom:20}}>
        {VERTS.map(v=>{const x=vfill[v.id];return (
          <Card key={v.id} style={{padding:12}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,fontWeight:600,marginBottom:3}}>
              <span>{v.name}</span><span style={{color:"var(--color-text-tertiary)",fontWeight:400}}>{x.f}/{x.t}</span>
            </div>
            <PBar f={x.f} t={x.t}/>
          </Card>
        );})}
      </div>
      <SH>Centres — tap for a centre dashboard</SH>
      {SECTORS.map(sec=>(
        <div key={sec.id} style={{marginBottom:18}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:9}}>{sec.name}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(152px,1fr))",gap:8}}>
            {sec.centres.map(c=>{
              const d=getCd(c.id);const stage=d.stage||0;
              let tf=0,tt=0;(d.units||[]).forEach(u=>{const x=countFill(u);tf+=x.f;tt+=x.t;});
              const live=(d.units||[]).length>0||stage>0;
              const mine=user.assignedCentre===c.id;
              return (
                <Card key={c.id} onClick={()=>nav("centreDash",c.id)}
                  style={{padding:11,cursor:"pointer",
                    border:`1px solid ${mine?"#534AB7":live?"#4A5C8A":"var(--color-border-tertiary)"}`,
                    boxShadow:live?"var(--shadow-md)":"var(--shadow-sm)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",gap:4,marginBottom:5}}>
                    <div style={{fontSize:12.5,fontWeight:600}}>{c.name}{mine&&<span style={{fontSize:9,color:"#534AB7"}}> ★ mine</span>}</div>
                    <Badge stage={stage}/>
                  </div>
                  {tt>0?<><PBar f={tf} t={tt}/><div style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:3}}>{tf}/{tt} roles</div></>
                    :<div style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:4}}>{(d.units||[]).length} units</div>}
                </Card>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Centre dashboard ──

  const d=getCd(cid);
  if(!cInfo) return <div>Centre not found.</div>;
  const coord=d.coord||{};
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <Btn onClick={()=>nav("dashboard")}>← Region</Btn>
        <div>
          <div className="display" style={{fontSize:20,fontWeight:600}}>{cInfo.name}</div>
          <div style={{fontSize:12,color:"var(--color-text-secondary)"}}>{cInfo.sectorName} · <Badge stage={d.stage||0}/></div>
        </div>
        {canEdit&&<Btn onClick={()=>nav("detail",cid)} style={{marginLeft:"auto",fontWeight:600,background:"var(--accent)",color:"#fff",borderColor:"var(--accent)"}}>✎ Edit centre</Btn>}
      </div>
      <div style={{background:"linear-gradient(135deg,#EEEDFE,#F5F1FB)",border:"1px solid #C9C3F2",borderRadius:"var(--radius)",padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:12,boxShadow:"var(--shadow-sm)"}}>
        <Av person={coord} size={38} style={{background:"#534AB7",color:"#fff",borderColor:"#534AB7"}}/>
        <div><div style={{fontSize:12,fontWeight:600,color:"#534AB7"}}>Centre coordinator</div>
          <div style={{fontSize:12.5}}>{coord.name||<span style={{color:"var(--color-text-secondary)"}}>Not registered</span>}{coord.contact?` · ${coord.contact}`:""}</div></div>
      </div>
      {!(d.units||[]).length&&<div style={{fontSize:13,color:"var(--color-text-tertiary)",padding:"20px 0"}}>No units planned yet. {canEdit&&<a style={{cursor:"pointer"}} onClick={()=>nav("detail",cid)}>Set up this centre →</a>}</div>}
      {(d.units||[]).map(u=>{

              <div style={{fontWeight:700,fontSize:13}}>{u.name}</div><Badge stage={st}/>
              <span style={{marginLeft:"auto",fontSize:11.5,color:"var(--color-text-tertiary)"}}>{f}/{t} · {pct(f,t)}%</span>
              {canEdit&&<Btn onClick={()=>nav("unit",cid,u.id)} style={{fontSize:11}}>✎ team</Btn>}
            </div>
            <div style={{padding:"4px 0"}}>
              {rolesForStage(st).map(r=>{
                const p=u.team?.[r.id]||{};
                return (
                  <div key={r.id}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:8,padding:"7px 13px",borderTop:"1px solid var(--color-border-tertiary)"}}>
                      <div style={{minWidth:150,fontSize:12.5,fontWeight:600,color:r.special?"#534AB7":undefined}}>{r.special?"★ ":r.n>0?`${r.n}. `:""}{r.name}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12.5}}>
                          <Dot status={p.name?.trim()?(p.status||"identified"):"vacant"}/>
                          {p.name?.trim()?<span>{p.name}{p.contact?` · ${p.contact}`:""}</span>:<span style={{color:"var(--color-text-tertiary)"}}>Vacant</span>}
                        </div>
                        {p.nextStep&&<div style={{fontSize:11.5,color:"#854F0B",marginTop:2}}>→ {p.nextStep}</div>}
                      </div>
                    </div>
                    {subsForStage(r,st).map(sb=>{const sp=u.team?.[sb.id]||{};return (
                      <div key={sb.id} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"3px 13px 3px 28px",fontSize:11.5,background:"var(--color-background-secondary)"}}>
                        <div style={{minWidth:138,color:"var(--color-text-secondary)"}}>↳ {sb.name}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <Dot status={sp.name?.trim()?(sp.status||"identified"):"vacant"}/>
                            {sp.name?.trim()?<span>{sp.name}</span>:<span style={{color:"var(--color-text-tertiary)"}}>Vacant</span>}
                          </div>
                          {sp.nextStep&&<div style={{fontSize:10.5,color:"#854F0B"}}>→ {sp.nextStep}</div>}
                        </div>
                      </div>
                    );})}
                  </div>
                );
              })}
            </div>
          </Card>
        );
      })}
    </div>
  );
}

// ── Interactive blueprint (triangle map + list) ──
function BlueprintTree() {
  const [mode,setMode] = useState("map");
  const [open,setOpen] = useState({});
  const [selVert,setSelVert] = useState("nurturing");
  const [sel,setSel] = useState(ROLES[1]);
  const toggle = id => setOpen(o=>({...o,[id]:!o[id]}));
  const stages=[
    {s:1,n:"Micro centre",c:"#185FA5",desc:"Locality / satsang level"},
    {s:2,n:"Sub-centre",c:"#0F6E56",desc:"Neighbourhood scale"},
    {s:3,n:"Centre",c:"#534AB7",desc:"Full centre"},
    {s:4,n:"Super centre",c:"#854F0B",desc:"Hub for sub-centres"},
  ];
  const colOf = r => r.special?"#534AB7":SC_COLOR[Math.min(r.minS,4)];

  // ----- list-mode node -----
  const Node = ({role}) => {
    const isOpen=open[role.id]; const hasSubs=role.subs.length>0; const isSel=sel?.id===role.id;
    const col=colOf(role);
    return (
      <div style={{marginBottom:5}}>
        <div onClick={()=>{setSel(role); if(!role.special)setSelVert(role.id); if(hasSubs)toggle(role.id);}}
          style={{display:"flex",alignItems:"center",gap:9,padding:"8px 11px",borderRadius:10,cursor:"pointer",
            boxShadow:isSel?"var(--shadow-sm)":"none",
            border:`1px solid ${isSel?col:"var(--color-border-tertiary)"}`,
            background:isSel?(SC_BG[Math.min(role.minS,4)]):"var(--color-background-primary)"}}>
          <span style={{width:16,textAlign:"center",color:"var(--color-text-tertiary)",fontSize:11}}>{hasSubs?(isOpen?"▾":"▸"):"•"}</span>
          <span style={{width:10,height:10,borderRadius:"50%",background:col,flexShrink:0}}/>
          <span style={{fontSize:13.5,fontWeight:600,color:role.special?"#534AB7":undefined}}>{role.special?"★ ":role.n>0?`${role.n}. `:""}{role.name}</span>
          <span style={{marginLeft:"auto",fontSize:10,color:"var(--color-text-tertiary)"}}>Stage {role.minS}+{hasSubs?` · ${role.subs.length}`:""}</span>
        </div>
        {hasSubs&&isOpen&&(
          <div style={{marginLeft:21,paddingLeft:11,borderLeft:"2px solid var(--color-border-tertiary)",marginTop:5}}>
            {role.subs.map(sb=>(
              <div key={sb.id} onClick={()=>setSel({...sb,parent:role.name,desc:`Sub-role of ${role.name}.`})}
                style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:8,marginBottom:4,cursor:"pointer",
                  border:`1px solid ${sel?.id===sb.id?col:"transparent"}`,
                  background:sel?.id===sb.id?SC_BG[Math.min(sb.minS,4)]:"var(--color-background-secondary)"}}>
                <span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>↳</span>
                <span style={{fontSize:12.5}}>{sb.name}</span>
                <span style={{marginLeft:"auto",fontSize:10,color:"var(--color-text-tertiary)"}}>S{sb.minS}+</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  // ----- map geometry -----
  const verts = ROLES.filter(r=>!r.special);
  const coord = ROLES.find(r=>r.special);
  const cx=410, cy=345, R=208, R2=322;
  const polar=(a,r)=>[cx+r*Math.cos(a), cy+r*Math.sin(a)];
  const nodes = verts.map((r,i)=>{ const a=(-90 + i*(360/verts.length))*Math.PI/180; const [x,y]=polar(a,R); return {r,a,x,y}; });
  const selNode = nodes.find(n=>n.r.id===selVert);
  let subNodes=[];
  if(selNode){
    const subs=selNode.r.subs||[]; const N=subs.length;
    const stepDeg = N>1?Math.min(13,86/(N-1)):0;
    const baseDeg = selNode.a*180/Math.PI;
    subNodes = subs.map((sb,i)=>{ const a=(baseDeg+(i-(N-1)/2)*stepDeg)*Math.PI/180; const [x,y]=polar(a,R2); return {sb,x,y}; });
  }
  const Pill = ({x,y,label,fill,stroke,textColor,onClick,bold,dim,small}) => {
    const w = Math.max(small?44:62, label.length*(small?6.0:6.9)+18);
    const h = small?22:28;
    return (
      <g onClick={onClick} style={{cursor:"pointer",opacity:dim?0.42:1,transition:"opacity .2s ease"}}>
        <rect x={x-w/2} y={y-h/2} width={w} height={h} rx={h/2} fill={fill} stroke={stroke} strokeWidth={bold?2:1}/>
        <text x={x} y={y} textAnchor="middle" dominantBaseline="central" fontSize={small?10.5:12} fontWeight={bold?700:600} fill={textColor}>{label}</text>
      </g>
    );
  };

  const detail = sel && (
    <Card style={{padding:18,boxShadow:"var(--shadow-md)"}}>
      <div style={{fontSize:10,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:5}}>
        {sel.parent?`Sub-role · ${sel.parent}`:sel.special?"★ Special role":"Vertical"} {sel.minS?`· Stage ${sel.minS}+`:""}
      </div>
      <div className="display" style={{fontSize:19,fontWeight:600,marginBottom:7,color:sel.special?"#534AB7":undefined}}>{sel.name}</div>
      <div style={{fontSize:13.5,color:"var(--color-text-secondary)",lineHeight:1.55,marginBottom:12}}>{sel.desc}</div>
      {sel.subs&&sel.subs.length>0&&(
        <div>
          <div style={{fontSize:11,fontWeight:600,color:"var(--color-text-secondary)",marginBottom:6}}>Branches into — tap to explore</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {sel.subs.map(sb=>(
              <span key={sb.id} onClick={()=>{setSelVert(sel.id);setSel({...sb,parent:sel.name,desc:`Sub-role of ${sel.name}.`});}}
                style={{fontSize:11.5,padding:"4px 10px",borderRadius:14,cursor:"pointer",background:"var(--color-background-secondary)",color:"var(--color-text-secondary)"}}>{sb.name}</span>
            ))}
          </div>
        </div>
      )}
    </Card>
  );

  return (
    <div>
      <Title sub={<span>The centre sits at the core; verticals branch outward. Tap a vertical to fan out its sub-roles. <a href="https://canva.link/eomoga9bzxj0q9g" target="_blank" rel="noreferrer">open Canva ↗</a></span>}>Roles &amp; Responsibilities</Title>
      <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{display:"flex",background:"var(--color-background-secondary)",padding:4,borderRadius:11}}>
          {[["map","△ Triangle map"],["list","☰ List"]].map(([m,l])=>(
            <button key={m} onClick={()=>setMode(m)} style={{padding:"6px 13px",fontSize:12.5,border:"none",borderRadius:8,cursor:"pointer",
              fontWeight:mode===m?700:500,boxShadow:mode===m?"var(--shadow-sm)":"none",
              background:mode===m?"var(--color-background-primary)":"transparent",color:mode===m?"#534AB7":"var(--color-text-secondary)"}}>{l}</button>
          ))}
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:6,flexWrap:"wrap"}}>
          {stages.map(d=>(
            <span key={d.s} style={{fontSize:10.5,padding:"3px 9px",borderRadius:12,background:SC_BG[d.s],color:d.c,fontWeight:600}}>{d.s}·{d.n}</span>
          ))}
        </div>
      </div>
      {mode==="map" ? (
        <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"flex-start"}}>
          <Card style={{flex:"1 1 470px",minWidth:300,padding:6,background:"radial-gradient(circle at 50% 46%, #ffffff, #f9f6ef)"}}>
            <svg viewBox="0 0 820 700" style={{width:"100%",height:"auto",display:"block"}}>
              {nodes.map(n=>(
                <line key={"l"+n.r.id} x1={cx} y1={cy} x2={n.x} y2={n.y}
                  stroke={n.r.id===selVert?colOf(n.r):"#d9d4c7"} strokeWidth={n.r.id===selVert?2.5:1.2} opacity={n.r.id===selVert?0.9:0.55}/>
              ))}
              {selNode&&subNodes.map((s,i)=>(
                <line key={"sl"+i} x1={selNode.x} y1={selNode.y} x2={s.x} y2={s.y} stroke={colOf(selNode.r)} strokeWidth={1.3} opacity={0.5}/>
              ))}
              <g onClick={()=>setSel(coord)} style={{cursor:"pointer"}}>
                <polygon points={`${cx},${cy-74} ${cx-86},${cy+58} ${cx+86},${cy+58}`} fill="#EEF0F6" stroke="#4A5C8A" strokeWidth={1.5}/>
                <polygon points={`${cx},${cy-44} ${cx-58},${cy+44} ${cx+58},${cy+44}`} fill="#5B9E8F" opacity={0.16}/>
                <polygon points={`${cx},${cy-18} ${cx-34},${cy+33} ${cx+34},${cy+33}`} fill="#8BA8C0" opacity={0.18}/>
                <text x={cx} y={cy+6} textAnchor="middle" fontFamily="Fraunces, Georgia, serif" fontSize={18} fontWeight={600} fill="#3d4a6b">CENTRE</text>
                <text x={cx} y={cy+27} textAnchor="middle" fontSize={10} fill="#6a6760">Karnataka</text>
              </g>
              <Pill x={cx} y={cy-106} label="★ Coordinator" fill="#534AB7" stroke="#534AB7" textColor="#ffffff" bold={sel?.id==="coordinator"} onClick={()=>setSel(coord)}/>
              {nodes.map(n=>{
                const isSel=n.r.id===selVert;
                return <Pill key={n.r.id} x={n.x} y={n.y} label={n.r.name}
                  fill={isSel?SC_BG[Math.min(n.r.minS,4)]:"#ffffff"} stroke={colOf(n.r)}
                  textColor={isSel?colOf(n.r):"#3a382f"} bold={isSel} dim={!isSel}
                  onClick={()=>{setSelVert(n.r.id); setSel(n.r);}}/>;
              })}
              {subNodes.map((s)=>{
                const isSel=sel?.id===s.sb.id;
                return <Pill key={s.sb.id} x={s.x} y={s.y} label={s.sb.name} small
                  fill={isSel?SC_BG[Math.min(s.sb.minS,4)]:"#ffffff"} stroke={isSel?colOf(selNode.r):"#e0dccf"}
                  textColor="#3a382f" bold={isSel}
                  onClick={()=>setSel({...s.sb,parent:selNode.r.name,desc:`Sub-role of ${selNode.r.name}.`})}/>;
              })}
            </svg>
          </Card>
          <div style={{flex:"1 1 250px",minWidth:240}}>{detail}</div>
        </div>
      ) : (
        <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"flex-start"}}>
          <div style={{flex:"1 1 340px",minWidth:300}}>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",borderRadius:12,
              background:"linear-gradient(135deg,#4A5C8A,#5B6FA8)",color:"#fff",marginBottom:10,boxShadow:"var(--shadow-md)"}}>
              <svg width="22" height="20" viewBox="0 0 40 35"><polygon points="20,2 38,33 2,33" fill="#fff" opacity=".95"/><polygon points="20,12 30,30 10,30" fill="#4A5C8A"/></svg>
              <div className="display" style={{fontSize:15,fontWeight:600}}>Isha Karnataka centre</div>
            </div>
            <div style={{marginLeft:19,paddingLeft:13,borderLeft:"2px solid var(--color-border-tertiary)"}}>
              {ROLES.map(r=><Node key={r.id} role={r}/>)}
            </div>
          </div>
          <div style={{flex:"1 1 280px",minWidth:260,position:"sticky",top:80}}>{detail}</div>
        </div>
      )}
    </div>
  );
}

// ── My Profile ──
function MyProfile({user, token, onUpdated}) {
  const [p,setP] = useState(()=>({name:user.name||"",contact:"",photo:"",...(user.profile||{})}));
  const [txt,setTxt] = useState("");
  const ref = useRef();
  const upd = k => v => setP(prev=>({...prev,[k]:v}));
  const save = async () => {
    setTxt("Saving…");
    try{ const r=await api("updateProfile",{token, profile:p}); if(r.ok){ setTxt("Saved ✓"); onUpdated&&onUpdated(p);} else setTxt(r.error||"Failed"); }
    catch(e){ setTxt("Save failed"); }
  };
  return (
    <div style={{maxWidth:680}}>
      <Title sub={`${user.email} · role: ${user.role}${user.assignedCentre?` · centre: ${(ALL_CENTRES.find(c=>c.id===user.assignedCentre)||{}).name||user.assignedCentre}`:""}`}>My profile</Title>
      <Card style={{padding:16,marginBottom:14}}>
        <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
          <div onClick={()=>ref.current?.click()} style={{width:78,height:78,borderRadius:"50%",background:"#EEEDFE",
            border:"1.5px dashed #AFA9EC",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden"}}>
            {p.photo?<img src={p.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:26,color:"#AFA9EC"}}>+</span>}
          </div>
          <input ref={ref} type="file" accept="image/*" style={{display:"none"}}
            onChange={e=>{const file=e.target.files[0];if(!file)return;const rd=new FileReader();rd.onload=ev=>setP(prev=>({...prev,photo:ev.target.result}));rd.readAsDataURL(file);}}/>
          <div style={{flex:1,minWidth:200}}>
            <Field label="Full name" type="text" value={p.name} onChange={upd("name")}/>
            <Field label="Mobile" type="tel" value={p.contact} onChange={upd("contact")}/>
          </div>
        </div>
      </Card>
      {PROFILE_SECTIONS.map(sec=>(
        <Card key={sec.id} style={{padding:16,marginBottom:12}}>
          <SH mt={0}>{sec.title}</SH>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:"0 14px"}}>
            {sec.fields.map(fld=>(
              <Field key={fld.k} label={fld.label} type={fld.type} value={p[fld.k]} options={fld.options} onChange={upd(fld.k)}/>
            ))}
          </div>
        </Card>
      ))}
      <div style={{display:"flex",alignItems:"center",gap:12,marginTop:10,position:"sticky",bottom:0,
        background:"linear-gradient(180deg,rgba(246,243,234,0),#f6f3ea 40%)",padding:"14px 0 10px",backdropFilter:"blur(4px)"}}>
        <Btn onClick={save} style={{fontWeight:600,background:"var(--accent)",color:"#fff",borderColor:"var(--accent)",padding:"9px 18px"}}>Save profile</Btn>
        <span style={{fontSize:12.5,color:"var(--color-text-secondary)"}}>{txt}</span>
      </div>
    </div>
  );
}

// ── Admin: users & approvals ──
function AdminUsers({token}) {
  const [users,setUsers] = useState(null);
  const [msg,setMsg] = useState("");
  const load = async ()=>{ setMsg("Loading…"); try{const r=await api("listUsers",{token}); if(r.ok){setUsers(r.users);setMsg("");}else setMsg(r.error);}catch(e){setMsg("Failed to load");} };
  useEffect(()=>{ load(); },[]);
  const update = async (email,patch)=>{
    setMsg("Saving…");
    try{ const r=await api("approveUser",{token,email,...patch}); if(r.ok){ setMsg("Saved ✓"); load(); } else setMsg(r.error); }
    catch(e){ setMsg("Failed"); }
  };
  const cell={padding:"8px",borderBottom:"1px solid var(--color-border-tertiary)",fontSize:12.5,verticalAlign:"top"};
  if(!users) return <div style={{fontSize:13,color:"var(--color-text-secondary)"}}>{msg||"Loading users…"}</div>;
  const pending=users.filter(u=>u.status==="pending");
  return (
    <div>
      <Title sub={`${users.length} accounts · ${pending.length} awaiting approval · ${msg}`}>Users &amp; approvals</Title>
      <Card style={{overflowX:"auto",padding:0}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:760}}>
          <thead><tr>{["Name / email","Status","Role","Assigned centre","Actions"].map(h=>(
            <th key={h} style={{...cell,fontWeight:600,color:"var(--color-text-secondary)",background:"var(--color-background-secondary)"}}>{h}</th>
          ))}</tr></thead>
          <tbody>
            {users.map(u=>(
              <tr key={u.email}>
                <td style={cell}><div style={{fontWeight:600}}>{u.name||"—"}</div><div style={{color:"var(--color-text-tertiary)"}}>{u.email}</div></td>
                <td style={cell}>
                  <span style={{padding:"3px 9px",borderRadius:12,fontSize:11,fontWeight:600,
                    background:u.status==="approved"?"#E1F5EE":u.status==="pending"?"#FAEEDA":"#f1efe8",
                    color:u.status==="approved"?"#0F6E56":u.status==="pending"?"#854F0B":"#888780"}}>{u.status}</span>
                </td>
                <td style={cell}>
                  <select value={u.role} onChange={e=>update(u.email,{role:e.target.value})}
                    style={{fontSize:12,padding:"4px 6px",borderRadius:7,border:"1px solid var(--color-border-tertiary)",background:"var(--color-background-primary)"}}>
                    <option value="user">user</option><option value="admin">admin</option>
                  </select>
                </td>
                <td style={cell}>
                  <select value={u.assignedCentre||""} onChange={e=>update(u.email,{assignedCentre:e.target.value})}
                    style={{fontSize:12,padding:"4px 6px",borderRadius:7,border:"1px solid var(--color-border-tertiary)",background:"var(--color-background-primary)",maxWidth:170}}>
                    <option value="">— none —</option>
                    {ALL_CENTRES.map(c=><option key={c.id} value={c.id}>{c.name} ({c.sectorName})</option>)}
                  </select>
                </td>
                <td style={cell}>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {u.status!=="approved"&&<Btn onClick={()=>update(u.email,{status:"approved"})} style={{fontSize:11,background:"#E1F5EE",borderColor:"#0F6E56",color:"#0F6E56"}}>Approve</Btn>}
                    {u.status!=="rejected"&&<Btn onClick={()=>update(u.email,{status:"rejected"})} style={{fontSize:11,color:"#dc2626",borderColor:"#fca5a5"}}>Reject</Btn>}
                    {u.status==="approved"&&<Btn onClick={()=>update(u.email,{status:"suspended"})} style={{fontSize:11}}>Suspend</Btn>}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// ── Auth screen ──
function AuthScreen({onLogin}) {
  const [mode,setMode] = useState("login");
  const [email,setEmail] = useState("");
  const [password,setPassword] = useState("");
  const [name,setName] = useState("");
  const [msg,setMsg] = useState("");
  const [busy,setBusy] = useState(false);
  const submit = async () => {
    setMsg(""); setBusy(true);
    try{
      if(mode==="login"){
        const r=await api("login",{email,password});
        if(r.ok) onLogin(r.token,r.user); else setMsg(r.error||"Login failed");
      } else {
        const r=await api("signup",{email,password,name});
        if(r.ok){ setMsg(r.status==="approved"?"Account created & approved — you can log in now.":"Account created. An admin will approve you shortly."); setMode("login"); }
        else setMsg(r.error||"Sign-up failed");
      }
    }catch(e){ setMsg("Network/backend error. Check GAS_URL in the file."); }
    setBusy(false);
  };
  const input={width:"100%",padding:"11px 13px",border:"1px solid var(--color-border-tertiary)",borderRadius:11,
    fontSize:14,marginBottom:10,background:"var(--color-background-primary)",color:"var(--color-text-primary)",outline:"none"};
  return (
    <div style={{minHeight:"90vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:370,maxWidth:"94vw"}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{position:"relative",width:64,height:64,margin:"0 auto 12px"}}>
            <div style={{position:"absolute",inset:-8,borderRadius:"50%",background:"radial-gradient(circle,#C9C3F2,transparent 70%)",animation:"glowPulse 3.5s ease-in-out infinite"}}/>
            <svg width="64" height="56" viewBox="0 0 40 35" style={{position:"relative"}}><polygon points="20,2 38,33 2,33" fill="#4A5C8A" opacity=".92"/><polygon points="20,10 30,28 10,28" fill="#5B9E8F" opacity=".88"/><polygon points="20,16 26,27 14,27" fill="#8BA8C0" opacity=".85"/></svg>
          </div>
          <div className="display" style={{fontSize:26,fontWeight:600,letterSpacing:"-0.01em"}}>Isha Karnataka</div>
          <div style={{fontSize:12.5,color:"var(--color-text-secondary)",marginTop:3}}>Volunteer team builder</div>
        </div>
        <div style={{border:"1px solid var(--color-border-secondary)",borderRadius:20,padding:24,
          background:"var(--color-background-primary)",boxShadow:"var(--shadow-lg)"}}>
          <div style={{display:"flex",gap:6,marginBottom:16,background:"var(--color-background-secondary)",padding:4,borderRadius:11}}>
            {[["login","Log in"],["signup","Sign up"]].map(([m,l])=>(
              <button key={m} onClick={()=>{setMode(m);setMsg("");}}
                style={{flex:1,padding:"8px",fontSize:13,borderRadius:8,cursor:"pointer",fontWeight:mode===m?700:500,
                  border:"none",boxShadow:mode===m?"var(--shadow-sm)":"none",
                  background:mode===m?"var(--color-background-primary)":"transparent",color:mode===m?"#534AB7":"var(--color-text-secondary)"}}>{l}</button>
            ))}
          </div>
          {mode==="signup"&&<input style={input} placeholder="Full name" value={name} onChange={e=>setName(e.target.value)}/>}
          <input style={input} type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} autoComplete="username"/>
          <input style={input} type="password" placeholder="Password" value={password}
            onChange={e=>setPassword(e.target.value)} autoComplete={mode==="login"?"current-password":"new-password"}
            onKeyDown={e=>e.key==="Enter"&&submit()}/>
          <button onClick={submit} disabled={busy}
            style={{width:"100%",padding:"12px",fontSize:14.5,fontWeight:600,borderRadius:11,cursor:busy?"wait":"pointer",
              border:"none",background:"linear-gradient(135deg,#534AB7,#6A5FD0)",color:"#fff",marginTop:4,boxShadow:"var(--shadow-md)"}}>{busy?"…":(mode==="login"?"Log in":"Create account")}</button>
          {msg&&<div style={{fontSize:12.5,color:msg.includes("approve")||msg.includes("created")?"#0F6E56":"#dc2626",marginTop:12,lineHeight:1.45}}>{msg}</div>}
          {!backendReady()&&<div style={{fontSize:11,color:"#854F0B",marginTop:12}}>⚠ Backend not configured — set GAS_URL in the HTML (see SETUP.md).</div>}
        </div>
        <div style={{fontSize:11.5,color:"var(--color-text-tertiary)",textAlign:"center",marginTop:14,lineHeight:1.5}}>
          New accounts require admin approval before sign-in.
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──
function App() {
  const [authUser,setAuthUser] = useState(null);
  const [token,setToken] = useState(()=>{ try{return localStorage.getItem(TOKEN_LS)||"";}catch(e){return "";} });
  const [authChecked,setAuthChecked] = useState(false);

  const [S,setS] = useState(null);
  const [view,setView] = useState("dashboard");
  const [curCId,setCurCId] = useState(null);
  const [curUID,setCurUID] = useState(null);
  const [saveTxt,setSaveTxt] = useState("");
  const timer = useRef();
  const firstLoad = useRef(true);

  useEffect(()=>{
    (async()=>{
      if(token && backendReady()){
        try{ const r=await api("me",{token}); if(r.ok){ setAuthUser(r.user); } else { localStorage.removeItem(TOKEN_LS); setToken(""); } }
        catch(e){}
      }
      setAuthChecked(true);
    })();
  },[]);

  useEffect(()=>{
    if(!authUser) return;
    (async()=>{
      try{ const r=await api("getState",{token}); const raw=r.ok?(r.value||""):""; setS(raw?JSON.parse(raw):{region:{},centres:{}}); }
      catch(e){ setS({region:{},centres:{}}); }
      firstLoad.current=true;
      setSaveTxt("Ready");
      setView("dashboard");
    })();
  },[authUser]);

  useEffect(()=>{
    if(!S||!authUser) return;
    if(firstLoad.current){ firstLoad.current=false; return; }
    setSaveTxt("Saving…");
    clearTimeout(timer.current);
    timer.current=setTimeout(async()=>{
      try{
        if(authUser.role==="admin"){ const r=await api("setState",{token, value:JSON.stringify(S)}); setSaveTxt(r.ok?"Saved ✓":(r.error||"Save failed")); }
        else { const cid=authUser.assignedCentre; if(!cid){setSaveTxt("No centre assigned");return;} const r=await api("setCentre",{token, centreId:cid, data:S.centres?.[cid]||{}}); setSaveTxt(r.ok?"Saved ✓":(r.error||"Save failed")); }
      }catch(e){ setSaveTxt("Save failed"); }
    },900);
  },[S]);

  const onLogin=(tk,user)=>{ try{localStorage.setItem(TOKEN_LS,tk);}catch(e){} setToken(tk); setAuthUser(user); };
  const logout=()=>{ try{localStorage.removeItem(TOKEN_LS);}catch(e){} setToken(""); setAuthUser(null); setS(null); };

  const getCd = id => S?.centres?.[id]||{stage:0,units:[],notes:"",coord:{}};
  const updCd = (id,patch) => setS(p=>({...p,centres:{...p.centres,[id]:{...getCd(id),...patch}}}));
  const getUnit = (cid,uid) => getCd(cid).units?.find(u=>u.id===uid)||{id:uid,name:uid,stage:1,team:{}};
  const updUnit = (cid,uid,patch) => { const cd=getCd(cid); updCd(cid,{units:(cd.units||[]).map(u=>u.id===uid?{...u,...patch}:u)}); };
  const nav = (v,cid,uid) => { if(cid!==undefined) setCurCId(cid); if(uid!==undefined) setCurUID(uid); setView(v); window.scrollTo(0,0); };

  const isAdmin = authUser?.role==="admin";
  const canEditCentre = cid => isAdmin || (authUser?.assignedCentre===cid);

  if(!authChecked) return <div style={{padding:24,fontSize:14,color:"var(--color-text-secondary)"}}>Checking session…</div>;
  if(!authUser) return <AuthScreen onLogin={onLogin}/>;
  if(authUser.status && authUser.status!=="approved")
    return <div style={{padding:24}}><div className="display" style={{fontSize:22,fontWeight:600,marginBottom:6}}>Awaiting approval</div>
      <div style={{fontSize:13,color:"var(--color-text-secondary)"}}>Your account ({authUser.email}) is pending admin approval.</div>
      <div style={{marginTop:14}}><Btn onClick={logout}>Log out</Btn></div></div>;
  if(!S) return <div style={{padding:24,fontSize:14,color:"var(--color-text-secondary)"}}>Loading data…</div>;

  const exportCSV = () => {
    const rows=[["Layer","Sector","Centre","Unit","Role","Name","Contact","Email","Status","Next step"]];
    REGION_ROLES.forEach(r=>{const p=S.region?.[r.id]||{};rows.push(["Region","—","—","—",r.name,p.name||"",p.contact||"",p.email||"",p.status||"vacant",p.nextStep||""]);});
    ALL_CENTRES.forEach(c=>{
      const cd=getCd(c.id);const coord=cd.coord||{};
      rows.push(["Coordinator",c.sectorName,c.name,"—","Centre coordinator",coord.name||"",coord.contact||"",coord.email||"","",""]);
      (cd.units||[]).forEach(u=>{
        const st=u.stage||1;
        rolesForStage(st).forEach(r=>{
          const p=u.team?.[r.id]||{};
          rows.push([c.sectorName,c.sectorName,c.name,u.name,r.name,p.name||"",p.contact||"",p.email||"",p.status||"vacant",p.nextStep||""]);
          subsForStage(r,st).forEach(sb=>{const sp=u.team?.[sb.id]||{};rows.push([c.sectorName,c.sectorName,c.name,u.name,"  ↳ "+sb.name,sp.name||"",sp.contact||"",sp.email||"",sp.status||"vacant",sp.nextStep||""]);});
        });
      });
    });
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="isha_karnataka_team.csv";a.click();
  };

  const tabs = isAdmin
    ? [["dashboard","Dashboard"],["explore","Explore"],["centres","Centres"],["region","Region"],["blueprint","Blueprint"],["admin","Users"],["profile","My profile"]]
    : [["dashboard","Dashboard"],["explore","Explore"],...(authUser.assignedCentre?[["mycentre","My centre"]]:[]),["blueprint","Blueprint"],["profile","My profile"]];
  const activeTab = ["detail","unit","centreDash","mycentre"].includes(view)?"dashboard":view;

  const Topbar = () => (
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,paddingTop:14,paddingBottom:11,
      position:"sticky",top:0,zIndex:50,marginTop:-18,marginLeft:-20,marginRight:-20,paddingLeft:20,paddingRight:20,
      background:"rgba(248,245,238,0.82)",backdropFilter:"saturate(160%) blur(12px)",WebkitBackdropFilter:"saturate(160%) blur(12px)",
      borderBottom:"1px solid var(--color-border-tertiary)",flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"center",gap:9,marginRight:"auto",cursor:"pointer"}} onClick={()=>nav("dashboard")}>
        <svg width="26" height="23" viewBox="0 0 40 35">
          <polygon points="20,2 38,33 2,33" fill="#4A5C8A" opacity=".9"/>
          <polygon points="20,10 30,28 10,28" fill="#5B9E8F" opacity=".85"/>
          <polygon points="20,16 26,27 14,27" fill="#8BA8C0" opacity=".8"/>
        </svg>
        <div>
          <div className="display" style={{fontSize:16.5,fontWeight:600,lineHeight:1.05}}>Isha Karnataka</div>
          <div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{authUser.name||authUser.email} · {isAdmin?"admin":"member"}{saveTxt?` · ${saveTxt}`:""}</div>
        </div>
      </div>
      <div style={{display:"flex",border:"1px solid var(--color-border-tertiary)",borderRadius:10,overflow:"hidden",flexWrap:"wrap",background:"var(--color-background-primary)",boxShadow:"var(--shadow-sm)"}}>
        {tabs.map(([id,lbl])=>(
          <button key={id} onClick={()=>{ if(id==="mycentre") nav("detail",authUser.assignedCentre); else nav(id); }}
            style={{padding:"6px 12px",fontSize:12.5,border:"none",cursor:"pointer",
              borderRight:"1px solid var(--color-border-tertiary)",fontWeight:activeTab===id?600:450,
              background:activeTab===id?"var(--accent-soft)":"var(--color-background-primary)",
              color:activeTab===id?"#534AB7":"var(--color-text-secondary)"}}>{lbl}</button>
        ))}
      </div>
      {isAdmin&&<Btn onClick={exportCSV} style={{color:"var(--color-text-secondary)"}}>↓ Export</Btn>}
      <Btn onClick={logout} style={{color:"var(--color-text-secondary)"}}>Log out</Btn>
    </div>
  );

  let body=null;
  if(view==="dashboard") body=<RegionDashboard S={S} getCd={getCd} nav={nav} user={authUser}/>;
  else if(view==="centreDash") body=<CentreDashboard cid={curCId} S={S} getCd={getCd} nav={nav} canEdit={canEditCentre(curCId)}/>;
  else if(view==="detail") body=<DetailView cid={curCId} S={S} updCd={updCd} nav={nav} readOnly={!canEditCentre(curCId)}/>;
  else if(view==="unit") {
    const cInfo=ALL_CENTRES.find(c=>c.id===curCId);
    const uData=curCId&&curUID?getUnit(curCId,curUID):null;
    const ro=!canEditCentre(curCId);
    body = (!cInfo||!uData) ? <div>Unit not found.</div> : (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
          <Btn onClick={()=>nav(ro?"centreDash":"detail",curCId)}>← {cInfo.name}</Btn>
          <div>
            <div className="display" style={{fontSize:19,fontWeight:600}}>{uData.name}</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <Badge stage={uData.stage||1}/>
              {!ro&&<select value={uData.stage||1} onChange={e=>updUnit(curCId,curUID,{stage:+e.target.value})}
                style={{fontSize:11,border:"1px solid var(--color-border-tertiary)",borderRadius:6,padding:"3px 5px",
                  background:"var(--color-background-primary)",color:"var(--color-text-primary)"}}>
                {[1,2,3,4,5].map(s=><option key={s} value={s}>{SL[s]}</option>)}
              </select>}
            </div>
          </div>
          <Btn onClick={()=>nav("blueprint")} style={{marginLeft:"auto"}}>R&R ↗</Btn>
        </div>
        <TeamTable unit={uData} readOnly={ro} onChange={updated=>updUnit(curCId,curUID,updated)}/>
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:10}}>
          <Btn onClick={()=>nav(ro?"centreDash":"detail",curCId)} style={{fontWeight:600,background:"var(--color-background-secondary)"}}>Done ✓</Btn>
        </div>
      </div>
    );
  }
  else if(view==="centres" && isAdmin) body=<CentresEditor S={S} getCd={getCd} nav={nav}/>;
  else if(view==="region" && isAdmin) body=<RegionView S={S} setS={setS}/>;
  else if(view==="blueprint") body=<BlueprintTree/>;
  else if(view==="admin" && isAdmin) body=<AdminUsers token={token}/>;
  else if(view==="profile") body=<MyProfile user={authUser} token={token} onUpdated={pr=>setAuthUser(u=>({...u,profile:pr,name:pr.name||u.name}))}/>;
  else if(view==="explore") body=<ExploreWizard SECTORS={SECTORS} S={S} getCd={getCd} updCd={updCd} nav={nav}/>;
  else body=<RegionDashboard S={S} getCd={getCd} nav={nav} user={authUser}/>;

  return <div><Topbar/><div key={view} className="view">{body}</div></div>;
}

  MYSURU:      {emoji:"🏛️", from:"#AB47BC", to:"#CE93D8", ring:"#8E24AA"},
};
function exploreTheme(id){
  return EXPLORE_SECTOR_THEMES[id] || {emoji:"✨", from:"#5C6BC0", to:"#7986CB", ring:"#3949AB"};
}

// Local fallback persistence (used if backend updCd not available)
function exploreLocalKey(cid){ return "ika_roles_"+cid; }
function exploreLoadLocal(cid){
  try { return JSON.parse(localStorage.getItem(exploreLocalKey(cid))||"{}"); } catch(e){ return {}; }
}
function exploreSaveLocal(cid, roles){
  try { localStorage.setItem(exploreLocalKey(cid), JSON.stringify(roles||{})); } catch(e){}
}

// === Centre Classification Tiers ===
const CLASS_TIERS = [
  { id: 1, key: "micro",  label: "Micro Center",       desc: "Smallest unit. Just the nurturing seed.",                           roles: ["nurturing"] },
  { id: 2, key: "sub",    label: "Sub Center",         desc: "Growing center with core outreach roles.",                          roles: ["nurturing","programs","promotions"] },
  { id: 3, key: "full",   label: "Full Fledged Center",desc: "All nine pillars are active in the center.",                        roles: ["nurturing","relations","registration","database","programs","temple","biksha","finance","promotions"] },
  { id: 4, key: "super",  label: "Super Center",       desc: "Full fledged + radiating influence beyond the center.",             roles: ["nurturing","relations","registration","database","programs","temple","biksha","finance","promotions"] },
];
const TIER_THEMES = {
  micro: { from:"#B8C5E0", to:"#7A8AB8", ring:"#5A6BA0" },
  sub:   { from:"#8BA3C7", to:"#4F6C9B", ring:"#3A5478" },
  full:  { from:"#A8C9D6", to:"#6B95A8", ring:"#4E7A8E" },
  super: { from:"#C9B8E0", to:"#8B6BB8", ring:"#6B4A98" },
};

// Pyramid of triangles. Layers (top → bottom):
// L1 (1): top → "nurturing"
// L2 (2): "relations"-related and "database"-related slots; in our reference image row 2 is "registration","database"
// We follow the reference image precisely:
// Row1: NURTURING
// Row2: REGISTRATION, RELATIONS(center filler), DATABASE
// Row3: PROGRAMS, TEMPLE, BIKSHA, PROMOTIONS  → with FINANCE in the center of row 3 (between TEMPLE & BIKSHA)
// We render as a 4-row triangular grid using SVG.
function ClassificationViz({ tier }) {
  const activeKey = tier ? tier.key : null;
  const activeRoles = tier ? new Set(tier.roles) : new Set();

  // Role labels and which tier first unlocks them
  const ROLE_FIRST_TIER = {
    nurturing: 1, programs: 2, promotions: 2,
    relations: 3, registration: 3, database: 3, temple: 3, biksha: 3, finance: 3,
  };
  const COLOR_BY_TIER = { 1:"#5A6BA0", 2:"#3A5478", 3:"#4E7A8E", 4:"#6B4A98" };
  const FILL_ACTIVE = { 1:"#7A8AB8", 2:"#4F6C9B", 3:"#6B95A8", 4:"#8B6BB8" };
  const FILL_INACTIVE = "#E5E2D8";
  const STROKE_INACTIVE = "#CFCBBE";
  const TEXT_ACTIVE = "#ffffff";
  const TEXT_INACTIVE = "#9A9684";

  // 4-row pyramid coordinates (triangular layout)
  // We use unit triangles of side s; row r has 2r-1 small triangles.
  // Map (row, col) → role id (or null filler)
  // Reference image FULL FLEDGED CENTER layout:
  //  Row 1 (top, 1 up-triangle): NURTURING
  //  Row 2 (3 triangles: up,down,up): RELATIONS(top of row at the center), REGISTRATION (left up), DATABASE (right up)
  // After review of the image, the pyramid is actually:
  //   Layer A (top tri): NURTURING
  //   Layer B has 4 small triangles forming row 2: left-up "REGISTRATION", center-down (filler -> "RELATIONS"), right-up "DATABASE"
  //   Layer C has 5 small triangles row 3: PROGRAMS(left up), filler-down, TEMPLE(up), filler-down, BIKSHA(up)...
  // For simplicity & fidelity, we render a hand-laid layout matching the image:
  const NODES = [
    // {row, kind: 'up'|'down', cx, cy, role, label}
    { role:"nurturing",    label:"NURTURING",    cx:50,  cy:14, kind:"up" },
    { role:"registration", label:"REGISTRATION", cx:33,  cy:38, kind:"up" },
    { role:"relations",    label:"RELATIONS",    cx:50,  cy:32, kind:"down" },
    { role:"database",     label:"DATABASE",     cx:67,  cy:38, kind:"up" },
    { role:"programs",     label:"PROGRAMS",     cx:17,  cy:62, kind:"up" },
    { role:"temple",       label:"TEMPLE",       cx:38,  cy:56, kind:"down" },
    { role:"finance",      label:"FINANCE",      cx:50,  cy:62, kind:"up" },
    { role:"biksha",       label:"BIKSHA",       cx:62,  cy:56, kind:"down" },
    { role:"promotions",   label:"PROMOTIONS",   cx:83,  cy:62, kind:"up" },
  ];

  const W = 360, H = 280;
  const triSize = 56; // edge length in px

  function triPath(cx, cy, kind) {
    const s = triSize;
    const h = s * Math.sqrt(3) / 2;
    if (kind === "up") {
      return `M ${cx} ${cy - h*2/3} L ${cx - s/2} ${cy + h/3} L ${cx + s/2} ${cy + h/3} Z`;
    }
    return `M ${cx} ${cy + h*2/3} L ${cx - s/2} ${cy - h/3} L ${cx + s/2} ${cy - h/3} Z`;
  }

  return (
    React.createElement("div", { style: { display:"flex", flexDirection:"column", alignItems:"center", padding:"18px 12px", background:"linear-gradient(180deg,#FBF8F0,#F4EFE2)", borderRadius:16, border:"1px solid #E0DACB" } },
      React.createElement("svg", { viewBox: "0 0 100 80", width: W, height: H, style:{ overflow:"visible" } },
        // optional radiating dotted lines for super center
        activeKey === "super" && [
          [50,12,30,-15],[50,12,70,-15],[50,12,20,0],[50,12,80,0],
          [16,62,-5,55],[16,62,-2,75],[84,62,105,55],[84,62,102,75],
          [50,62,30,90],[50,62,70,90],[50,62,50,95]
        ].map((c,i)=> React.createElement("line", { key:"r"+i, x1:c[0], y1:c[1], x2:c[2], y2:c[3], stroke:"#534AB7", strokeWidth:0.5, strokeDasharray:"1,1", opacity:0.7 })),
        NODES.map((n,i) => {
          const isActive = activeRoles.has(n.role);
          const firstTier = ROLE_FIRST_TIER[n.role] || 3;
          const fill = isActive ? FILL_ACTIVE[firstTier] : FILL_INACTIVE;
          const stroke = isActive ? COLOR_BY_TIER[firstTier] : STROKE_INACTIVE;
          return React.createElement("g", { key:"n"+i, style:{ transition:"all .35s ease" } },
            React.createElement("path", { d: triPath(n.cx, n.cy, n.kind), fill, stroke, strokeWidth:0.4, opacity: isActive ? 1 : 0.55 }),
            React.createElement("text", { x:n.cx, y:n.cy + (n.kind==="down" ? -1 : 3), textAnchor:"middle", fontSize:3.2, fontWeight:700, fill: isActive ? TEXT_ACTIVE : TEXT_INACTIVE, style:{ pointerEvents:"none", letterSpacing:"0.04em" } }, n.label })
          );
        })
      ),
      React.createElement("div", { style:{ marginTop:10, fontSize:13, fontWeight:600, color:"#3a382f", textTransform:"uppercase", letterSpacing:"0.08em" } }, tier ? tier.label : "Pick a classification")
    )
  );
}

function ExploreWizard({SECTORS, S, getCd, updCd, nav}) {
  const [path, setPath] = React.useState([]);
  const [hoverId, setHoverId] = React.useState(null);
  const [editingRole, setEditingRole] = React.useState(null);
  const [draft, setDraft] = React.useState({name:"",phone:"",email:"",notes:""});
  const [savedAt, setSavedAt] = React.useState(null);
  const [classTier, setClassTier] = React.useState(null);
  
  const sector = path.find(p=>p.type==='sector');
  const centre = path.find(p=>p.type==='centre');
  const sectorObj = sector ? SECTORS.find(s=>s.id===sector.id) : null;
  const centreObj = (sectorObj && centre) ? sectorObj.centres.find(c=>c.id===centre.id) : null;
  const centreData = centre ? getCd(centre.id) : null;
  const activeTheme = sector ? exploreTheme(sector.id) : exploreTheme(null);

  // Merge backend roles with local fallback
  const liveRoles = React.useMemo(()=>{
    if(!centre) return {};
    const fromBackend = (centreData && centreData.roles) || {};
    const fromLocal = exploreLoadLocal(centre.id);
    return {...fromLocal, ...fromBackend};
  }, [centre, centreData]);

  const push = (step) => { setEditingRole(null); setPath(p => [...p, step]); };
  const jumpTo = (idx) => { setEditingRole(null); setPath(p => p.slice(0, idx+1)); };
  const reset = () => { setEditingRole(null); setPath([]); };

  const openEditor = (roleId) => {
    const cur = liveRoles[roleId] || {};
    setDraft({name:cur.name||"", phone:cur.phone||"", email:cur.email||"", notes:cur.notes||""});
    setEditingRole(roleId);
    setSavedAt(null);
  };

  const saveRole = () => {
    if(!centre || !editingRole) return;
    const nextRoles = {...liveRoles, [editingRole]: {...draft, updatedAt: new Date().toISOString()}};
    // Try backend via updCd
    try {
      if(typeof updCd === 'function'){ updCd(centre.id, {roles: nextRoles}); }
    } catch(e){}
    // Always also write local fallback so it survives reload even if backend is unconfigured
    exploreSaveLocal(centre.id, nextRoles);
    setSavedAt(Date.now());
    setTimeout(()=>setSavedAt(null), 1800);
  };

  const clearRole = () => {
    if(!centre || !editingRole) return;
    const nextRoles = {...liveRoles};
    delete nextRoles[editingRole];
    try { if(typeof updCd === 'function'){ updCd(centre.id, {roles: nextRoles}); } } catch(e){}
    exploreSaveLocal(centre.id, nextRoles);
    setDraft({name:"",phone:"",email:"",notes:""});
    setSavedAt(Date.now());
    setTimeout(()=>setSavedAt(null), 1800);
  };

  const Crumb = () => (
    <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:22,
      fontSize:17, padding:"10px 14px", borderRadius:14,
      background:"linear-gradient(135deg, rgba(83,74,183,.08), rgba(255,193,7,.10))",
      border:"1px solid rgba(83,74,183,.18)"}}>
      <span onClick={reset} style={{cursor:"pointer",color:"var(--accent)",fontWeight:700,fontSize:18}}>🧭 Explore</span>
      {path.map((p,i)=>(
        <React.Fragment key={i}>
          <span style={{color:"#bbb",fontSize:18}}>›</span>
          <span onClick={()=>jumpTo(i)} style={{
            cursor:"pointer",
            color: i===path.length-1?"var(--color-text-primary)":"var(--accent)",
            fontWeight: i===path.length-1?700:600,
            fontSize: i===path.length-1?18:17,
            padding:"3px 9px", borderRadius:10,
            background: i===path.length-1?"rgba(83,74,183,.10)":"transparent"
          }}>{p.label}</span>
        </React.Fragment>
      ))}
      {editingRole && (
        <React.Fragment>
          <span style={{color:"#bbb",fontSize:18}}>›</span>
          <span style={{color:"var(--color-text-primary)",fontWeight:700,fontSize:18,padding:"3px 9px",borderRadius:10,background:"rgba(83,74,183,.10)"}}>
            {(CENTRE_ROLES.find(r=>r.id===editingRole)||{}).label || editingRole}
          </span>
        </React.Fragment>
      )}
    </div>
  );

  const Header = ({title, sub, big}) => (
    <div style={{marginBottom:22}}>
      <div className="display" style={{
        fontSize: big?38:30, fontWeight:700, letterSpacing:"-.02em", lineHeight:1.1,
        background:"linear-gradient(135deg,"+activeTheme.from+","+activeTheme.to+")",
        WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
        backgroundClip:"text"
      }}>{title}</div>
      {sub && <div style={{fontSize:17,color:"var(--color-text-secondary)",marginTop:8,lineHeight:1.5,maxWidth:760}}>{sub}</div>}
    </div>
  );

  const Grid = ({children, min}) => (

  );

  function ColorCard({id, theme, title, sub, hint, onClick, disabled, big, footer}){
    const hovered = hoverId===id;
    return (
      <div
        onMouseEnter={()=>!disabled && setHoverId(id)}
        onMouseLeave={()=>setHoverId(null)}
        onClick={()=>!disabled && onClick && onClick()}
        style={{
          position:"relative", cursor: disabled?"not-allowed":"pointer",
          padding:"22px 22px 20px", borderRadius:20,
          background:"linear-gradient(135deg,"+theme.from+",  "+theme.to+")",
          color:"#fff",

          transform: hovered? "translateY(-4px) scale(1.015)" : "translateY(0) scale(1)",
          transition:"transform .18s cubic-bezier(.2,.7,.3,1), box-shadow .22s ease",
          overflow:"hidden",
          opacity: disabled?0.55:1,
          minHeight: big?180:150
        }}>
        <div style={{position:"absolute", top:-30, right:-30, width:130, height:130, borderRadius:"50%",
          background:"rgba(255,255,255,.18)", filter:"blur(2px)"}}/>
        <div style={{position:"absolute", bottom:-40, left:-20, width:120, height:120, borderRadius:"50%",
          background:"rgba(0,0,0,.10)"}}/>
        <div style={{position:"relative", display:"flex", alignItems:"center", gap:12, marginBottom:10}}>
          <div style={{fontSize: big?44:34, lineHeight:1}}>{theme.emoji}</div>
          <div style={{fontWeight:700, fontSize: big?22:20, letterSpacing:"-.01em"}}>{title}</div>
        </div>
        {sub && <div style={{position:"relative", fontSize:14.5, opacity:.94, lineHeight:1.45}}>{sub}</div>}
        {hint && <div style={{position:"relative", marginTop:12, display:"inline-block",
          padding:"5px 11px", borderRadius:999, background:"rgba(255,255,255,.22)",
          fontSize:12.5, fontWeight:600, letterSpacing:".02em"}}>{hint}</div>}
        {footer && <div style={{position:"relative", marginTop:10, fontSize:13, opacity:.95, fontStyle:"italic"}}>{footer}</div>}
      </div>
    );
  }

  // EDITOR for a single role
  if(centre && editingRole){
    const role = CENTRE_ROLES.find(r=>r.id===editingRole);
    const th = role.theme;
    const inputStyle = {
      width:"100%", padding:"12px 14px", fontSize:15, borderRadius:12,
      border:"1px solid var(--color-border-secondary)", background:"var(--color-background-primary)",
      outline:"none", marginTop:6, fontFamily:"inherit"
    };
    const labelStyle = {fontSize:13, fontWeight:600, color:"var(--color-text-secondary)", textTransform:"uppercase", letterSpacing:".06em"};
    return (
      <div className="view">
        <Crumb/>
        <div style={{
          padding:"26px 26px 22px", borderRadius:24,
          background:"linear-gradient(135deg,"+th.from+","+th.to+")", color:"#fff",
          boxShadow:"0 12px 40px -10px "+th.ring+"66, 0 6px 16px rgba(0,0,0,.10)",
          marginBottom:22, position:"relative", overflow:"hidden"
        }}>
          <div style={{position:"absolute", top:-40, right:-40, width:180, height:180, borderRadius:"50%", background:"rgba(255,255,255,.18)"}}/>
          <div style={{position:"relative", display:"flex", alignItems:"center", gap:14}}>
            <div style={{fontSize:54, lineHeight:1}}>{th.emoji}</div>
            <div>
              <div className="display" style={{fontSize:30, fontWeight:800, letterSpacing:"-.01em"}}>{role.label}</div>
              <div style={{fontSize:14, opacity:.92, marginTop:2}}>{centreObj.name} · {sectorObj.name}</div>
            </div>
          </div>
          <div style={{position:"relative", marginTop:14, fontSize:15.5, opacity:.96, lineHeight:1.5, maxWidth:760}}>{role.desc}</div>
        </div>

        <div style={{
          background:"var(--color-background-primary)",
          border:"1px solid var(--color-border-tertiary)",
          borderRadius:20, padding:"22px 22px 20px",
          boxShadow:"var(--shadow-md)", maxWidth:760
        }}>
          <div className="display" style={{fontSize:20, fontWeight:700, marginBottom:14}}>📝 Assignment</div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:14}}>
            <div>
              <div style={labelStyle}>Name</div>
              <input style={inputStyle} value={draft.name} onChange={e=>setDraft({...draft, name:e.target.value})} placeholder="Full name"/>
            </div>
            <div>
              <div style={labelStyle}>Phone</div>
              <input style={inputStyle} value={draft.phone} onChange={e=>setDraft({...draft, phone:e.target.value})} placeholder="+91 ..."/>
            </div>
            <div style={{gridColumn:"1 / -1"}}>
              <div style={labelStyle}>Email</div>
              <input style={inputStyle} type="email" value={draft.email} onChange={e=>setDraft({...draft, email:e.target.value})} placeholder="name@example.com"/>
            </div>
            <div style={{gridColumn:"1 / -1"}}>
              <div style={labelStyle}>Notes</div>
              <textarea style={{...inputStyle, minHeight:96, resize:"vertical"}} value={draft.notes} onChange={e=>setDraft({...draft, notes:e.target.value})} placeholder="Anything relevant: locality, availability, focus areas..."/>
            </div>
          </div>

          <div style={{display:"flex", alignItems:"center", gap:10, marginTop:18, flexWrap:"wrap"}}>
            <button onClick={saveRole} style={{
              padding:"12px 22px", border:"none", borderRadius:14, cursor:"pointer",
              background:"linear-gradient(135deg,"+th.from+","+th.to+")", color:"#fff",
              fontWeight:700, fontSize:15, letterSpacing:".01em",
              boxShadow:"0 8px 22px -8px "+th.ring+"99"
            }}>💾 Save</button>
            <button onClick={()=>setEditingRole(null)} style={{
              padding:"12px 18px", borderRadius:14, cursor:"pointer", fontSize:15,
              background:"var(--color-background-secondary)", color:"var(--color-text-primary)",
              border:"1px solid var(--color-border-secondary)", fontWeight:600
            }}>Cancel</button>
            {(liveRoles[editingRole]) && (
              <button onClick={clearRole} style={{
                padding:"12px 18px", borderRadius:14, cursor:"pointer", fontSize:14,
                background:"transparent", color:"#c0392b",
                border:"1px solid #f1c5be", fontWeight:600
              }}>Clear assignment</button>
            )}
            {savedAt && <span style={{color:"#1e8449", fontWeight:600, fontSize:14}}>✅ Saved</span>}
          </div>
        </div>
      </div>
    );
  }

  // STEP 1: pick sector
  if(!sector){
    return (
      <div className="view">
        <Crumb/>
        <Header big title="🌍 Choose a Sector" sub="Every option opens the next set of options. Tap a sector to begin your journey."/>
        <Grid>
          {SECTORS.map((s)=>{
            const th = exploreTheme(s.id);
            const n = (s.centres||[]).length;
            return (
              <ColorCard big key={s.id} id={"sector-"+s.id} theme={th}
                title={s.name}
                sub={n+" centre"+(n===1?"":"s")+" · explore the network"}
                hint={"Branch into centres →"}
                onClick={()=>push({type:'sector', id:s.id, label:s.name})}/>

          })}

      </div>

  if(sector && !centre){

                );
              })}
            </div>
            <ClassificationViz tier={classTier}/>
          </div>
        </div>

        <Grid min={300}>
          {(classTier ? CENTRE_ROLES.filter(r=>classTier.roles.includes(r.id)) : CENTRE_ROLES).map(r=>{
            const cur = liveRoles[r.id];
            const filled = !!(cur && (cur.name||cur.phone||cur.email||cur.notes));
            return (
              <ColorCard key={r.id} id={"role-"+r.id} theme={r.theme}
                title={r.label} sub={r.desc}
                hint={filled ? "Edit ✏️" : "Assign →"}
                footer={filled ? ("👤 "+(cur.name||"(no name)")+(cur.phone?(" · "+cur.phone):"")) : "Unassigned"}
                onClick={()=>openEditor(r.id)}/>
            );
          })}
        </Grid>
        <div style={{marginTop:18, fontSize:13, color:"var(--color-text-secondary)"}}>
          💾 Data is stored on the backend per centre when configured, and also kept locally on this device as a safety net.
        </div>
      </div>
    );
  }

  return <div>Unknown step.</div>;
}

// admin centres editor grid (full edit)
function CentresEditor({S, getCd, nav}) {
  const totalC=ALL_CENTRES.length;
  const liveC=ALL_CENTRES.filter(c=>{const d=getCd(c.id);return (d.units||[]).length>0||d.stage>0;}).length;
  return (
    <div>
      <Title sub={<span><b>{totalC}</b> centres · <b>{SECTORS.length}</b> sectors · <span style={{color:"#1D9E75",fontWeight:600}}>{liveC}</span> set up — tap to edit</span>}>Centres</Title>
      {SECTORS.map(sec=>{
        let sf=0,st=0;sec.centres.forEach(c=>{(getCd(c.id).units||[]).forEach(u=>{const x=countFill(u);sf+=x.f;st+=x.t;});});
        return (
          <div key={sec.id} style={{marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:".08em"}}>{sec.name}</div>
              <div style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{sec.centres.length} centres{st>0&&` · ${sf}/${st} roles`}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
              {sec.centres.map(c=>{
                const d=getCd(c.id);const stage=d.stage||0;const coord=d.coord||{};
                let tf=0,tt=0;(d.units||[]).forEach(u=>{const x=countFill(u);tf+=x.f;tt+=x.t;});
                const live=(d.units||[]).length>0||stage>0;
                return (
                  <Card key={c.id} onClick={()=>nav("detail",c.id)}
                    style={{padding:11,cursor:"pointer",
                      border:`1px solid ${live?"#4A5C8A":"var(--color-border-tertiary)"}`,
                      boxShadow:live?"var(--shadow-md)":"var(--shadow-sm)"}}>
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:4,marginBottom:5}}>
                      <div style={{fontSize:12.5,fontWeight:600,lineHeight:1.3}}>{c.name}</div><Badge stage={stage}/>
                    </div>
                    {c.taluk&&<div style={{fontSize:10,color:"#854F0B",background:"#FAEEDA",borderRadius:8,padding:"1px 6px",display:"inline-block",marginBottom:3}}>Taluk</div>}
                    {c.activeClasses&&<div style={{fontSize:10,color:"#0F6E56",background:"#E1F5EE",borderRadius:8,padding:"1px 6px",display:"inline-block",marginBottom:3}}>Classes ✓</div>}
                    {c.med>0&&<div style={{fontSize:10,color:"var(--color-text-tertiary)",marginBottom:3}}>{c.med.toLocaleString()} med.</div>}
                    {coord.name&&<div style={{fontSize:10,color:"#534AB7",marginBottom:3}}>📋 {coord.name}</div>}
                    {tt>0?<><PBar f={tf} t={tt}/><div style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:3}}>{tf}/{tt}</div></>
                      :<div style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:4}}>{(d.units||[]).length} units</div>}
                  </Card>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
